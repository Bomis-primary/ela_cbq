<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Common and Proper Nouns Adventure</title>
<style>
  :root{
    --bg1:#dff3ff;
    --bg2:#fff7dd;
    --card:#ffffff;
    --ink:#233047;
    --pri:#2f80ed;
    --sec:#f2994a;
    --good:#27ae60;
    --bad:#eb5757;
    --shadow:0 12px 30px rgba(30,60,90,.12);
  }
  *{box-sizing:border-box}
  body{
    margin:0;
    font-family:Arial,Helvetica,sans-serif;
    color:var(--ink);
    background:
      radial-gradient(circle at top left, rgba(255,255,255,.75), transparent 28%),
      radial-gradient(circle at bottom right, rgba(255,245,210,.8), transparent 28%),
      linear-gradient(135deg,var(--bg1),var(--bg2));
    min-height:100vh;
    overflow-x:hidden;
  }
  .bg-grid{
    position:fixed;
    inset:0;
    pointer-events:none;
    opacity:.18;
    background-image:
      linear-gradient(rgba(47,128,237,.14) 1px, transparent 1px),
      linear-gradient(90deg, rgba(47,128,237,.14) 1px, transparent 1px);
    background-size:34px 34px;
  }
  .bg-bubbles{
    position:fixed;
    inset:0;
    pointer-events:none;
    overflow:hidden;
  }
  .bubble{
    position:absolute;
    border-radius:50%;
    background:rgba(255,255,255,.35);
    animation:floatUp linear infinite;
  }
  @keyframes floatUp{
    from{transform:translateY(110vh) translateX(0);opacity:.05}
    to{transform:translateY(-20vh) translateX(40px);opacity:.28}
  }
  .wrap{
    max-width:980px;
    margin:0 auto;
    padding:16px;
    position:relative;
    z-index:1;
  }
  .screen{display:none}
  .screen.active{
    display:grid;
    min-height:100vh;
    place-items:center;
  }
  .card{
    width:100%;
    max-width:980px;
    background:var(--card);
    border-radius:24px;
    box-shadow:var(--shadow);
    padding:22px;
  }
  .splash-card{
    max-width:560px;
    text-align:center;
  }
  .logo-only{
    min-height:72vh;
    display:grid;
    place-items:center;
  }
  .logo{
    width:150px;
    height:150px;
    object-fit:contain;
    display:block;
    background:transparent;
    border:0;
    box-shadow:none;
  }
  h1,h2{margin:0 0 10px}
  p{margin:8px 0; line-height:1.5}
  .intro-note{
    margin-top:12px;
    font-size:.98rem;
    color:#576a82;
  }
  .btn{
    border:0;
    border-radius:16px;
    padding:14px 20px;
    font-weight:800;
    font-size:1rem;
    cursor:pointer;
    color:#fff;
    background:linear-gradient(135deg,var(--pri),#56ccf2);
    box-shadow:0 8px 18px rgba(47,128,237,.24);
  }
  .btn.secondary{
    background:linear-gradient(135deg,var(--sec),#f2c94c);
    box-shadow:0 8px 18px rgba(242,153,74,.22);
  }
  .topbar{
    display:flex;
    justify-content:space-between;
    gap:10px;
    flex-wrap:wrap;
    align-items:center;
    margin-bottom:14px;
  }
  .pill{
    background:#f3f7ff;
    border-radius:999px;
    padding:10px 14px;
    font-weight:700;
    border:1px solid rgba(47,128,237,.08);
  }
  .score{color:#1d8f4e}
  .timer{color:#c46a00}
  .progress{
    height:12px;
    background:#edf2ff;
    border-radius:999px;
    overflow:hidden;
    margin:12px 0 18px;
  }
  .bar{
    height:100%;
    width:0%;
    background:linear-gradient(90deg,#2f80ed,#27ae60);
    transition:width .3s ease;
  }
  .qbox{
    background:linear-gradient(180deg,#ffffff,#f8fbff);
    border:2px solid #e5eefc;
    border-radius:22px;
    padding:18px;
    position:relative;
    overflow:hidden;
  }
  .qbox:before{
    content:"";
    position:absolute;
    inset:0;
    background:
      linear-gradient(135deg, rgba(47,128,237,.04), transparent 55%),
      linear-gradient(225deg, rgba(242,153,74,.05), transparent 55%);
    pointer-events:none;
  }
  .qno{
    font-size:.95rem;
    font-weight:800;
    color:#6c7a92;
  }
  .question{
    font-size:1.18rem;
    font-weight:800;
    margin:10px 0 16px;
  }
  .opts{
    display:grid;
    gap:12px;
  }
  .opt{
    width:100%;
    text-align:left;
    padding:14px 16px;
    border-radius:16px;
    border:2px solid #dbe6f7;
    background:#fff;
    cursor:pointer;
    font-size:1rem;
    font-weight:700;
  }
  .opt:hover{
    border-color:#8fb7ff;
    background:#f8fbff;
  }
  .opt.correct{
    background:#eafaf1;
    border-color:var(--good);
  }
  .opt.wrong{
    background:#fff1f2;
    border-color:var(--bad);
  }
  .feedback{
    margin-top:14px;
    padding:14px 16px;
    border-radius:16px;
    display:none;
    font-weight:600;
  }
  .feedback.show{display:block}
  .feedback.good{
    background:#ecfff4;
    color:#156b35;
  }
  .feedback.bad{
    background:#fff2f2;
    color:#9d1c1c;
  }
  .visual{
    position:relative;
    height:110px;
    overflow:hidden;
    margin:8px 0 2px;
  }
  .shape{
    position:absolute;
    border-radius:18px;
    opacity:.28;
    animation:drift 14s ease-in-out infinite alternate;
  }
  @keyframes drift{
    from{transform:translateX(0) rotate(0deg)}
    to{transform:translateX(30px) rotate(8deg)}
  }
  .s1{width:90px;height:90px;background:#d4e9ff;left:2%;top:10px;border-radius:26px}
  .s2{width:78px;height:78px;background:#ffe7c7;right:8%;top:16px;border-radius:50%}
  .s3{width:56px;height:56px;background:#d9f7e8;left:46%;top:42px;border-radius:18px}
  .s4{width:44px;height:44px;background:#ffdde7;left:70%;top:52px;border-radius:50%}
  .cross{
    position:fixed;
    width:74px;
    height:74px;
    pointer-events:none;
    opacity:0;
    transform:translate(-50%,-50%) scale(.5);
    transition:.25s;
    z-index:20;
  }
  .cross.show{
    opacity:1;
    transform:translate(-50%,-50%) scale(1);
  }
  .cross:before,.cross:after{
    content:"";
    position:absolute;
    left:34px;
    top:10px;
    width:6px;
    height:54px;
    background:var(--bad);
    border-radius:8px;
  }
  .cross:before{transform:rotate(45deg)}
  .cross:after{transform:rotate(-45deg)}
  .stamp{
    position:fixed;
    right:16px;
    bottom:16px;
    background:rgba(255,255,255,.94);
    padding:10px 14px;
    border-radius:999px;
    box-shadow:var(--shadow);
    font-weight:800;
    display:none;
    z-index:20;
  }
  .confetti{
    position:fixed;
    inset:0;
    pointer-events:none;
    overflow:hidden;
    z-index:15;
  }
  .confetti i{
    position:absolute;
    top:-20px;
    width:10px;
    height:10px;
    clip-path:polygon(50% 0%,61% 35%,98% 35%,68% 57%,79% 91%,50% 70%,21% 91%,32% 57%,2% 35%,39% 35%);
    animation:fall 1s linear forwards;
  }
  @keyframes fall{
    to{transform:translateY(110vh) rotate(720deg);opacity:0}
  }
  .subtitle{
    color:#5c6f89;
    font-size:.98rem;
  }
  @media (max-width:600px){
    .wrap{padding:12px}
    .card{padding:16px;border-radius:20px}
    .question{font-size:1.05rem}
    .opt{padding:12px 14px}
    .logo{width:130px;height:130px}
  }
</style>
</head>
<body>
<div class="bg-grid"></div>
<div class="bg-bubbles" id="bgBubbles"></div>
<div class="confetti" id="confetti"></div>
<div class="cross" id="cross"></div>
<div class="stamp" id="stamp">Great job!</div>

<div class="wrap">
  <section class="screen active" id="splashScreen">
    <div class="card splash-card">
      <div class="logo-only" id="logoOnly">
        <img src="assets/logo.png" alt="Innovine Logo" class="logo" />
      </div>
      <div id="introContent" style="display:none;">
        <h1>Common and Proper Nouns</h1>
        <p class="subtitle">Learn to spot general names and special names.</p>
        <p><strong>Chapter:</strong> Common and Proper Nouns</p>
        <p class="intro-note">You get one retry after a wrong answer. The quiz becomes slightly harder as you move ahead.</p>
        <button class="btn" id="startBtn" type="button">Start Quiz</button>
      </div>
    </div>
  </section>

  <section class="screen" id="quizScreen">
    <div class="card">
      <div class="topbar">
        <div class="pill">Question <span id="qIndex">1</span>/<span id="qTotal">15</span></div>
        <div class="pill score">Score: <span id="score">0</span></div>
        <div class="pill timer">Time: <span id="time">45</span>s</div>
      </div>
      <div class="progress"><div class="bar" id="bar"></div></div>
      <div class="visual">
        <div class="shape s1"></div>
        <div class="shape s2"></div>
        <div class="shape s3"></div>
        <div class="shape s4"></div>
      </div>
      <div class="qbox">
        <div class="qno" id="qNo"></div>
        <div class="question" id="question"></div>
        <div class="opts" id="opts"></div>
        <div class="feedback" id="feedback"></div>
      </div>
    </div>
  </section>

  <section class="screen" id="resultScreen">
    <div class="card splash-card">
      <h2>Quiz Complete</h2>
      <p id="resultText"></p>
      <button class="btn secondary" id="restartBtn" type="button">Play Again</button>
    </div>
  </section>
</div>

<script>
document.addEventListener('DOMContentLoaded', () => {
  const questions = [
    {q:'A child is writing about a trip to Delhi. Which word is the special name of a place?', o:['city','place','Delhi','road'], a:2, e:'Delhi is the special name of a particular place.'},
    {q:'Which word is a common noun?', o:['India','Monday','teacher','Ganga'], a:2, e:'Teacher is a general name for a person.'},
    {q:"A student writes, 'My teacher's name is Ms Sharma.' Which word is a proper noun?", o:['teacher','name','Ms Sharma','student'], a:2, e:'Ms Sharma is the special name of a particular person.'},
    {q:'A child wants to write about a specific river. Which word should be used?', o:['river','water','Yamuna','boat'], a:2, e:'Yamuna is the special name of a river.'},
    {q:'A child is making a birthday invitation. Which word should begin with a capital letter?', o:['friend','party','Sunday','cake'], a:2, e:'Sunday is the special name of a day.'},
    {q:'Which group contains only proper nouns?', o:['boy, girl, school','India, Monday, Ravi','city, river, teacher','dog, park, pencil'], a:1, e:'All the words in option b are special names.'},
    {q:'Which sentence needs correction?', o:['We visited Mumbai last year.','My friend lives in Chennai.','We travelled to delhi during the holidays.','India is our country.'], a:2, e:'Delhi is a proper noun and should begin with a capital letter.'},
    {q:'Which word is the special name of a festival?', o:['festival','holiday','Diwali','celebration'], a:2, e:'Diwali is the name of a specific festival.'},
    {q:'A child says, "I have a pet named Bruno." Which word is a common noun?', o:['Bruno','pet','named','have'], a:1, e:'Pet is a general name, while Bruno is a special name.'},
    {q:'Which pair contains a common noun and a proper noun?', o:['teacher, Mrs Kapoor','school, classroom','India, Delhi','river, city'], a:0, e:'Teacher is a common noun and Mrs Kapoor is a proper noun.'},
    {q:'A family is travelling to Goa. Which word names a specific place?', o:['family','place','Goa','travelling'], a:2, e:'Goa is the special name of a place.'},
    {q:'A child writes, "We will go on a picnic on Friday." Which word is a proper noun?', o:['picnic','Friday','go','will'], a:1, e:'Friday is the special name of a day.'},
    {q:'Which group contains only common nouns?', o:['teacher, city, river','India, Delhi, Monday','Ravi, Goa, Yamuna','Diwali, India, Chennai'], a:0, e:'These are all general names.'},
    {q:'A child wants to tell exactly which city was visited. Which word should be used?', o:['city','place','Mumbai','country'], a:2, e:'Mumbai is the special name of a city.'},
    {q:'Why do we use proper nouns?', o:['To name a specific person, place, animal or thing','To describe actions','To show position','To join sentences'], a:0, e:'Proper nouns give the exact name of a person, place, animal or thing.'}
  ];

  let idx = 0, score = 0, timeLeft = 45, timer = null, wrongAttempts = 0;
  const total = questions.length;

  const splashScreen = document.getElementById('splashScreen');
  const logoOnly = document.getElementById('logoOnly');
  const introContent = document.getElementById('introContent');
  const quizScreen = document.getElementById('quizScreen');
  const resultScreen = document.getElementById('resultScreen');
  const qIndex = document.getElementById('qIndex');
  const qTotal = document.getElementById('qTotal');
  const scoreEl = document.getElementById('score');
  const timeEl = document.getElementById('time');
  const bar = document.getElementById('bar');
  const qNo = document.getElementById('qNo');
  const questionEl = document.getElementById('question');
  const opts = document.getElementById('opts');
  const feedback = document.getElementById('feedback');
  const resultText = document.getElementById('resultText');
  const cross = document.getElementById('cross');
  const stamp = document.getElementById('stamp');
  const bgBubbles = document.getElementById('bgBubbles');
  const confettiLayer = document.getElementById('confetti');

  qTotal.textContent = total;

  const sounds = {
    correct: new Audio('assets/correct.mp3'),
    wrong: new Audio('assets/wrong.mp3'),
    clap: new Audio('assets/freesound_community-claps-44774.mp3')
  };
  Object.values(sounds).forEach(a => { a.preload = 'auto'; a.volume = 0.6; });

  function play(name){
    try{
      const a = sounds[name];
      if(a){
        a.currentTime = 0;
        a.play();
      }
    }catch(e){}
  }

  function showScreen(s){
    [splashScreen, quizScreen, resultScreen].forEach(x => x.classList.remove('active'));
    s.classList.add('active');
  }

  function showIntroAfterSplash(){
    logoOnly.style.display = 'none';
    introContent.style.display = 'block';
  }

  function startQuiz(){
    idx = 0;
    score = 0;
    wrongAttempts = 0;
    showScreen(quizScreen);
    loadQ();
  }

  function loadQ(){
    clearInterval(timer);
    const q = questions[idx];
    timeLeft = 45;
    qIndex.textContent = idx + 1;
    scoreEl.textContent = score;
    qNo.textContent = `Q${idx + 1}.`;
    questionEl.textContent = q.q;
    opts.innerHTML = '';
    feedback.className = 'feedback';
    feedback.textContent = '';
    timeEl.textContent = timeLeft;
    bar.style.width = ((idx) / total * 100) + '%';

    timer = setInterval(() => {
      timeLeft--;
      timeEl.textContent = timeLeft;
      if(timeLeft <= 0){
        clearInterval(timer);
        handleWrong(true);
      }
    }, 1000);

    q.o.forEach((t, i) => {
      const b = document.createElement('button');
      b.className = 'opt';
      b.type = 'button';
      b.textContent = String.fromCharCode(97 + i) + ') ' + t;
      b.addEventListener('click', () => answer(i, b));
      opts.appendChild(b);
    });
  }

  function answer(choice, btn){
    clearInterval(timer);
    const q = questions[idx];
    [...document.querySelectorAll('.opt')].forEach(x => x.disabled = true);

    if(choice === q.a){
      btn.classList.add('correct');
      score++;
      scoreEl.textContent = score;
      feedback.className = 'feedback good show';
      feedback.textContent = 'Correct! ' + q.e;
      play('correct');
      confettiBurst();
      setTimeout(next, 900);
    } else {
      handleWrong(false, btn);
    }
  }

  function handleWrong(fromTime, btn){
    wrongAttempts++;
    const q = questions[idx];

    if(btn) btn.classList.add('wrong');
    cross.classList.add('show');
    cross.style.left = '50%';
    cross.style.top = '50%';
    setTimeout(() => cross.classList.remove('show'), 450);
    play('wrong');

    if(wrongAttempts === 1 && !fromTime){
      feedback.className = 'feedback bad show';
      feedback.textContent = 'Try once more.';
      [...document.querySelectorAll('.opt')].forEach(x => x.disabled = false);
      return;
    }

    feedback.className = 'feedback bad show';
    feedback.textContent = `Correct answer: ${String.fromCharCode(97 + q.a)}) ${q.o[q.a]}. ${q.e}`;
    [...document.querySelectorAll('.opt')].forEach((x, i) => {
      if(i === q.a) x.classList.add('correct');
    });
    setTimeout(next, 1400);
  }

  function next(){
    idx++;
    bar.style.width = ((idx) / total * 100) + '%';
    if(idx < total) loadQ();
    else finish();
  }

  function confettiBurst(){
    stamp.style.display = 'block';
    stamp.textContent = 'Great job!';
    setTimeout(() => stamp.style.display = 'none', 800);
    for(let i = 0; i < 18; i++){
      const c = document.createElement('i');
      c.style.left = (Math.random() * 100) + '%';
      c.style.background = ['#ffd166','#ff7b54','#2f80ed','#27ae60','#ff9ff3'][i % 5];
      c.style.animationDuration = (.8 + Math.random() * .7) + 's';
      confettiLayer.appendChild(c);
      setTimeout(() => c.remove(), 1600);
    }
  }

  function finish(){
    clearInterval(timer);
    showScreen(resultScreen);
    const pct = Math.round((score / total) * 100);
    resultText.innerHTML = `You scored <strong>${score}/${total}</strong> (${pct}%). ${pct >= 80 ? 'Excellent!' : 'Nice work!'} Final challenge complete.`;
    play('clap');
  }

  document.getElementById('startBtn').addEventListener('click', startQuiz);
  document.getElementById('restartBtn').addEventListener('click', () => {
    showScreen(splashScreen);
    introContent.style.display = 'none';
    logoOnly.style.display = 'grid';
    setTimeout(showIntroAfterSplash, 5000);
  });

  for(let i = 0; i < 22; i++){
    const b = document.createElement('div');
    b.className = 'bubble';
    const size = 18 + Math.random() * 54;
    b.style.width = size + 'px';
    b.style.height = size + 'px';
    b.style.left = (Math.random() * 100) + '%';
    b.style.animationDuration = (10 + Math.random() * 12) + 's';
    b.style.animationDelay = (Math.random() * 8) + 's';
    b.style.background = ['rgba(47,128,237,.20)','rgba(242,153,74,.18)','rgba(39,174,96,.16)','rgba(255,255,255,.25)'][i % 4];
    bgBubbles.appendChild(b);
  }

  setTimeout(showIntroAfterSplash, 5000);
});
</script>
</body>
</html>
